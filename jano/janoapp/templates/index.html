<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jano — Just Ask</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background: #f8f7ff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #6C63FF;
            color: white;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-icon {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-sub {
            font-size: 12px;
            opacity: 0.75;
            margin-top: 1px;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 82%;
            padding: 11px 15px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
        }

        .user {
            background: #6C63FF;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .agent {
            background: white;
            color: #1a1a2e;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 0.5px solid #e8e8f0;
        }

        .typing {
            font-size: 13px;
            color: #888;
            align-self: flex-start;
            padding: 8px 14px;
            background: white;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            border: 0.5px solid #e8e8f0;
        }

        #input-area {
            padding: 12px 16px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #question {
            flex: 1;
            padding: 11px 16px;
            border: 1px solid #e0e0f0;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            background: #f8f7ff;
            color: #1a1a2e;
        }

        #question:focus {
            border-color: #6C63FF;
        }

        #send-btn {
            width: 42px;
            height: 42px;
            background: #6C63FF;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .suggestions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding: 0 16px 12px;
        }

        .suggestion {
            padding: 6px 12px;
            background: white;
            border: 1px solid #e0e0f0;
            border-radius: 99px;
            font-size: 12px;
            color: #6C63FF;
            cursor: pointer;
        }

        .suggestion:hover {
            background: #f0eeff;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-icon">জ</div>
        <div>
            <div class="header-title">Jano</div>
            <div class="header-sub">Your Banglish AI friend</div>
        </div>
    </div>

    <div id="chat">
        <div class="msg agent">
            Assalamu Alaikum! Ami Jano — tomar Banglish AI friend.<br><br>
            Math, programming, science — jei question thakuk, ami achi. Jiggesh koro!
        </div>
    </div>

    <div class="suggestions" id="suggestions">
        <div class="suggestion" onclick="fillQ('Bhai derivative ki? Bujtesi na')">Derivative ki?</div>
        <div class="suggestion" onclick="fillQ('Python e loop kivabe kaje kore?')">Python loop</div>
        <div class="suggestion" onclick="fillQ('HSC physics Newton er law explain koro')">Newton laws</div>
    </div>

    <div id="input-area">
        <input type="text" id="question" placeholder="Banglish e jiggesh koro..." />
        <button id="send-btn" onclick="sendMessage()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('question');
        const btn = document.getElementById('send-btn');
        const suggestions = document.getElementById('suggestions');

        input.addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });

        function fillQ(text) {
            input.value = text;
            input.focus();
            suggestions.style.display = 'none';
        }

        function addMsg(text, type) {
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.innerHTML = text.replace(/\n/g, '<br>');
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        async function sendMessage() {
            const question = input.value.trim();
            if (!question) return;

            suggestions.style.display = 'none';
            addMsg(question, 'user');
            input.value = '';
            btn.disabled = true;

            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.textContent = 'Jano likhche...';
            chat.appendChild(typing);
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch('/ask/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });
                const data = await res.json();
                typing.remove();
                addMsg(data.answer || data.error, 'agent');
            } catch (e) {
                typing.remove();
                addMsg('Oops bhai! Kono problem hoyeche. Abar try koro.', 'agent');
            }

            btn.disabled = false;
            input.focus();
        }
    </script>

</body>

</html>
