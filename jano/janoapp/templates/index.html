<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Jano — Just Ask</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d1a;
            --surface: #13132a;
            --surface2: #1a1a35;
            --accent: #7c6dfa;
            --accent2: #fa6dbc;
            --accent3: #6dfabc;
            --text: #f0eeff;
            --text-muted: #7878aa;
            --border: rgba(124, 109, 250, 0.18);
            --glow: rgba(124, 109, 250, 0.35);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            height: 100%;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            /* dvh = dynamic viewport height — shrinks when mobile keyboard opens */
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: var(--text);
            padding-bottom: env(safe-area-inset-bottom);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 10%, rgba(124, 109, 250, 0.12) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 80% 80%, rgba(250, 109, 188, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 60% 30%, rgba(109, 250, 188, 0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% {
                opacity: 0.7;
            }

            100% {
                opacity: 1;
            }
        }

        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }

            10% {
                opacity: 0.6;
            }

            90% {
                opacity: 0.3;
            }

            100% {
                transform: translateY(-10vh) translateX(30px);
                opacity: 0;
            }
        }

        /* Header — fixed, never moves */
        .header {
            flex-shrink: 0;
            position: relative;
            z-index: 10;
            padding: 14px 20px;
            padding-top: calc(14px + env(safe-area-inset-top));
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid var(--border);
            background: rgba(13, 13, 26, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header-icon {
            width: 40px;
            height: 40px;
            min-width: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 19px;
            font-family: 'Sora', sans-serif;
            font-weight: 800;
            color: white;
            box-shadow: 0 0 20px var(--glow), 0 4px 12px rgba(0, 0, 0, 0.4);
            animation: iconPop 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        @keyframes iconPop {
            from {
                transform: scale(0) rotate(-20deg);
                opacity: 0;
            }

            to {
                transform: scale(1) rotate(0);
                opacity: 1;
            }
        }

        .header-info {
            flex: 1;
            min-width: 0;
        }

        .header-title {
            font-family: 'Sora', sans-serif;
            font-size: 18px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header-sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            min-width: 8px;
            background: var(--accent3);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.4);
                opacity: 0.7;
            }
        }

        /* Chat area — flex:1 fills remaining space */
        #chat {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            z-index: 1;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        #chat::-webkit-scrollbar {
            width: 3px;
        }

        #chat::-webkit-scrollbar-track {
            background: transparent;
        }

        #chat::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .msg {
            max-width: 82%;
            padding: 11px 15px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.65;
            animation: msgIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
            word-break: break-word;
        }

        @keyframes msgIn {
            from {
                transform: translateY(14px) scale(0.96);
                opacity: 0;
            }

            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .user {
            background: linear-gradient(135deg, var(--accent) 0%, #9d6dfa 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
            box-shadow: 0 4px 20px rgba(124, 109, 250, 0.35);
        }

        .agent {
            background: var(--surface);
            color: var(--text);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .msg.agent.welcome {
            background: linear-gradient(135deg, var(--surface), var(--surface2));
            border-color: rgba(124, 109, 250, 0.3);
        }

        .typing {
            align-self: flex-start;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            border-bottom-left-radius: 5px;
            padding: 13px 16px;
            display: flex;
            gap: 5px;
            align-items: center;
            animation: msgIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            animation: typingBounce 1.2s ease-in-out infinite;
        }

        .dot:nth-child(2) {
            background: var(--accent2);
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            background: var(--accent3);
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.5;
            }

            30% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }

        /* Suggestions — horizontal scroll on mobile */
        .suggestions {
            flex-shrink: 0;
            display: flex;
            gap: 7px;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding: 6px 14px 10px;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .suggestions::-webkit-scrollbar {
            display: none;
        }

        @keyframes fadeUp {
            from {
                transform: translateY(8px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .suggestion {
            padding: 7px 13px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 99px;
            font-size: 12px;
            color: var(--accent);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .suggestion:active {
            background: rgba(124, 109, 250, 0.2);
            transform: scale(0.96);
        }

        /* Input area — always visible, sticks to bottom */
        #input-area {
            flex-shrink: 0;
            padding: 10px 14px 14px;
            background: rgba(13, 13, 26, 0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
            position: relative;
            z-index: 10;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
            from {
                transform: translateY(60px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        #question {
            flex: 1;
            min-width: 0;
            /* CRITICAL — prevents overflow in flex on mobile */
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 24px;
            font-size: 16px;
            /* 16px prevents iOS auto-zoom on tap */
            outline: none;
            background: var(--surface);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
            -webkit-appearance: none;
            appearance: none;
        }

        #question::placeholder {
            color: var(--text-muted);
        }

        #question:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124, 109, 250, 0.15);
            background: var(--surface2);
        }

        #send-btn {
            width: 46px;
            height: 46px;
            min-width: 46px;
            /* never shrink */
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            box-shadow: 0 4px 16px rgba(124, 109, 250, 0.4);
            -webkit-tap-highlight-color: transparent;
        }

        #send-btn:active:not(:disabled) {
            transform: scale(0.88);
        }

        #send-btn:disabled {
            background: var(--surface2);
            box-shadow: none;
            cursor: not-allowed;
        }

        @keyframes sendPop {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(0.85) rotate(-8deg);
            }

            100% {
                transform: scale(1) rotate(4deg);
            }
        }

        .sending {
            animation: sendPop 0.25s ease;
        }
    </style>
</head>

<body>
    <div class="particles" id="particles"></div>

    <div class="header">
        <div class="header-icon">জ</div>
        <div class="header-info">
            <div class="header-title">Jano</div>
            <div class="header-sub">Your Banglish AI friend • সবসময় পাশে আছি</div>
        </div>
        <div class="status-dot"></div>
    </div>

    <div id="chat">
        <div class="msg agent welcome">
            Assalamu Alaikum! Ami Jano — tomar Banglish AI friend. 👋<br><br>
            Math, programming, science — jei question thakuk, ami achi. Jiggesh koro bhai!
        </div>
    </div>

    <div class="suggestions" id="suggestions">
        <div class="suggestion" onclick="fillQ('Bhai derivative ki? Bujtesi na')">📐 Derivative ki?</div>
        <div class="suggestion" onclick="fillQ('Python e loop kivabe kaje kore?')">🐍 Python loop</div>
        <div class="suggestion" onclick="fillQ('HSC physics Newton er law explain koro')">⚡ Newton laws</div>
    </div>

    <div id="input-area">
        <input type="text" id="question" placeholder="Banglish e jiggesh koro..." autocomplete="off" />
        <button id="send-btn" onclick="sendMessage()">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('question');
        const btn = document.getElementById('send-btn');
        const suggestions = document.getElementById('suggestions');

        // Particles
        const particlesEl = document.getElementById('particles');
        for (let i = 0; i < 14; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const colors = ['#7c6dfa', '#fa6dbc', '#6dfabc', '#fad56d'];
            p.style.cssText = `
                left: ${Math.random() * 100}%;
                width: ${Math.random() * 3 + 1}px;
                height: ${Math.random() * 3 + 1}px;
                background: ${colors[Math.floor(Math.random() * colors.length)]};
                animation-duration: ${Math.random() * 12 + 8}s;
                animation-delay: ${Math.random() * 8}s;
            `;
            particlesEl.appendChild(p);
        }

        // Sound engine
        const SoundEngine = {
            ctx: null,
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            },
            whoosh() {
                try {
                    this.init();
                    const ctx = this.ctx;
                    const duration = 0.35;
                    const bufferSize = ctx.sampleRate * duration;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1);
                    const source = ctx.createBufferSource();
                    source.buffer = buffer;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.setValueAtTime(200, ctx.currentTime);
                    filter.frequency.exponentialRampToValueAtTime(1800, ctx.currentTime + duration);
                    filter.Q.value = 0.8;
                    const gain = ctx.createGain();
                    gain.gain.setValueAtTime(0.4, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                    source.connect(filter);
                    filter.connect(gain);
                    gain.connect(ctx.destination);
                    source.start();
                    source.stop(ctx.currentTime + duration);
                } catch (e) { }
            }
        };

        // Scroll chat down when keyboard opens on mobile
        input.addEventListener('focus', () => {
            setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 350);
        });

        input.addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });

        function fillQ(text) {
            input.value = text;
            input.focus();
            suggestions.style.display = 'none';
        }

        function addMsg(text, type) {
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.innerHTML = text.replace(/\n/g, '<br>');
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        async function sendMessage() {
            const question = input.value.trim();
            if (!question) return;

            SoundEngine.whoosh();
            suggestions.style.display = 'none';
            addMsg(question, 'user');
            input.value = '';
            btn.disabled = true;
            btn.classList.add('sending');
            setTimeout(() => btn.classList.remove('sending'), 300);

            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            chat.appendChild(typing);
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch('/ask/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });
                const data = await res.json();
                typing.remove();
                addMsg(data.answer || data.error, 'agent');
            } catch (e) {
                typing.remove();
                addMsg('Oops bhai! Kono problem hoyeche. Abar try koro. 😅', 'agent');
            }

            btn.disabled = false;
            input.focus();
        }
    </script>
</body>

</html>
