<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jano — Just Ask</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d1a;
            --surface: #13132a;
            --surface2: #1a1a35;
            --accent: #7c6dfa;
            --accent2: #fa6dbc;
            --accent3: #6dfabc;
            --text: #f0eeff;
            --text-muted: #7878aa;
            --border: rgba(124, 109, 250, 0.18);
            --glow: rgba(124, 109, 250, 0.35);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: var(--text);
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 10%, rgba(124, 109, 250, 0.12) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 80% 80%, rgba(250, 109, 188, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 60% 30%, rgba(109, 250, 188, 0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% {
                opacity: 0.7;
            }

            100% {
                opacity: 1;
            }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent);
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }

            10% {
                opacity: 0.6;
            }

            90% {
                opacity: 0.3;
            }

            100% {
                transform: translateY(-10vh) translateX(30px);
                opacity: 0;
            }
        }

        /* Header */
        .header {
            position: relative;
            z-index: 10;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid var(--border);
            background: rgba(13, 13, 26, 0.85);
            backdrop-filter: blur(20px);
            animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-family: 'Sora', sans-serif;
            font-weight: 800;
            color: white;
            box-shadow: 0 0 20px var(--glow), 0 4px 12px rgba(0, 0, 0, 0.4);
            animation: iconPop 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
            flex-shrink: 0;
        }

        @keyframes iconPop {
            from {
                transform: scale(0) rotate(-20deg);
                opacity: 0;
            }

            to {
                transform: scale(1) rotate(0);
                opacity: 1;
            }
        }

        .header-info {
            flex: 1;
        }

        .header-title {
            font-family: 'Sora', sans-serif;
            font-size: 18px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header-sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent3);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent3);
            animation: pulse 2s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.4);
                opacity: 0.7;
            }
        }

        /* Chat area */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            z-index: 1;
            scroll-behavior: smooth;
        }

        #chat::-webkit-scrollbar {
            width: 4px;
        }

        #chat::-webkit-scrollbar-track {
            background: transparent;
        }

        #chat::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        /* Messages */
        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.65;
            animation: msgIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
            position: relative;
        }

        @keyframes msgIn {
            from {
                transform: translateY(16px) scale(0.95);
                opacity: 0;
            }

            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .user {
            background: linear-gradient(135deg, var(--accent) 0%, #9d6dfa 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
            box-shadow: 0 4px 20px rgba(124, 109, 250, 0.35);
        }

        .agent {
            background: var(--surface);
            color: var(--text);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        /* Typing indicator */
        .typing {
            align-self: flex-start;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            border-bottom-left-radius: 5px;
            padding: 14px 18px;
            display: flex;
            gap: 5px;
            align-items: center;
            animation: msgIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            animation: typingBounce 1.2s ease-in-out infinite;
        }

        .dot:nth-child(2) {
            background: var(--accent2);
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            background: var(--accent3);
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.5;
            }

            30% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }

        /* Suggestions */
        .suggestions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding: 0 16px 10px;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
        }

        @keyframes fadeUp {
            from {
                transform: translateY(10px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .suggestion {
            padding: 7px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 99px;
            font-size: 12px;
            color: var(--accent);
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
        }

        .suggestion:hover {
            background: rgba(124, 109, 250, 0.15);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(124, 109, 250, 0.2);
        }

        .suggestion:active {
            transform: translateY(0);
        }

        /* Input area */
        #input-area {
            padding: 12px 16px 16px;
            background: rgba(13, 13, 26, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
            position: relative;
            z-index: 10;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        #question {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid var(--border);
            border-radius: 26px;
            font-size: 14px;
            outline: none;
            background: var(--surface);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            transition: all 0.3s ease;
        }

        #question::placeholder {
            color: var(--text-muted);
        }

        #question:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124, 109, 250, 0.15), 0 0 20px rgba(124, 109, 250, 0.1);
            background: var(--surface2);
        }

        #send-btn {
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.25s ease;
            box-shadow: 0 4px 16px rgba(124, 109, 250, 0.4);
        }

        #send-btn:hover:not(:disabled) {
            transform: scale(1.08) rotate(5deg);
            box-shadow: 0 6px 24px rgba(124, 109, 250, 0.6);
        }

        #send-btn:active:not(:disabled) {
            transform: scale(0.94);
        }

        #send-btn:disabled {
            background: var(--surface2);
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Welcome message special style */
        .msg.agent.welcome {
            background: linear-gradient(135deg, var(--surface), var(--surface2));
            border-color: rgba(124, 109, 250, 0.3);
        }

        /* Ripple on send */
        @keyframes sendPop {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(0.88) rotate(-10deg);
            }

            100% {
                transform: scale(1) rotate(5deg);
            }
        }

        .sending {
            animation: sendPop 0.3s ease;
        }
    </style>
</head>

<body>

    <!-- Floating particles -->
    <div class="particles" id="particles"></div>

    <div class="header">
        <div class="header-icon">জ</div>
        <div class="header-info">
            <div class="header-title">Jano</div>
            <div class="header-sub">Your Banglish AI friend • সবসময় পাশে আছি</div>
        </div>
        <div class="status-dot"></div>
    </div>

    <div id="chat">
        <div class="msg agent welcome">
            Assalamu Alaikum! Ami Jano — tomar Banglish AI friend. 👋<br><br>
            Math, programming, science — jei question thakuk, ami achi. Jiggesh koro bhai!
        </div>
    </div>

    <div class="suggestions" id="suggestions">
        <div class="suggestion" onclick="fillQ('Bhai derivative ki? Bujtesi na')">📐 Derivative ki?</div>
        <div class="suggestion" onclick="fillQ('Python e loop kivabe kaje kore?')">🐍 Python loop</div>
        <div class="suggestion" onclick="fillQ('HSC physics Newton er law explain koro')">⚡ Newton laws</div>
    </div>

    <div id="input-area">
        <input type="text" id="question" placeholder="Banglish e jiggesh koro..." autocomplete="off" />
        <button id="send-btn" onclick="sendMessage()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('question');
        const btn = document.getElementById('send-btn');
        const suggestions = document.getElementById('suggestions');

        // Generate particles
        const particlesEl = document.getElementById('particles');
        for (let i = 0; i < 18; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const colors = ['#7c6dfa', '#fa6dbc', '#6dfabc', '#fad56d'];
            p.style.cssText = `
                left: ${Math.random() * 100}%;
                width: ${Math.random() * 3 + 1}px;
                height: ${Math.random() * 3 + 1}px;
                background: ${colors[Math.floor(Math.random() * colors.length)]};
                animation-duration: ${Math.random() * 12 + 8}s;
                animation-delay: ${Math.random() * 8}s;
            `;
            particlesEl.appendChild(p);
        }

        input.addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });

        function fillQ(text) {
            input.value = text;
            input.focus();
            suggestions.style.display = 'none';
        }

        function addMsg(text, type) {
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.innerHTML = text.replace(/\n/g, '<br>');
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        async function sendMessage() {
            const question = input.value.trim();
            if (!question) return;

            suggestions.style.display = 'none';
            addMsg(question, 'user');
            input.value = '';
            btn.disabled = true;
            btn.classList.add('sending');
            setTimeout(() => btn.classList.remove('sending'), 300);

            // Typing indicator
            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            chat.appendChild(typing);
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch('/ask/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });
                const data = await res.json();
                typing.remove();
                addMsg(data.answer || data.error, 'agent');
            } catch (e) {
                typing.remove();
                addMsg('Oops bhai! Kono problem hoyeche. Abar try koro. 😅', 'agent');
            }

            btn.disabled = false;
            input.focus();
        }
        
            
    </script>

</body>

</html>
